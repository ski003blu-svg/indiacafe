kind = "web"
previewPath = "/"
title = "India Cafe"
version = "1.0.0"
id = "artifacts/india-cafe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21763

[services.development]
run = "pnpm --filter @workspace/india-cafe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/india-cafe", "run", "build" ]
publicDir = "artifacts/india-cafe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21763"
BASE_PATH = "/"
